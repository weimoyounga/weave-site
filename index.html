<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>色織模版</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="weave.css">
</head>
<body>


    <h1 class="page-title">色織模擬<span>經緯獨立版</span></h1>


    <div class="page-main">
    <div class="wrapper">
        <div class="controls">
            <div class="section-title">色彩配置</div>
            <div class="control-row">
                <label>經線顏色（縱向）<span class="color-label-codes"><span id="warpHex">#2C5282</span><span id="warpPantoneCode" class="pantone-label-line"></span></span></label>
                <div class="color-picker-row">
                    <input type="color" id="warpColor" value="#2c5282">
                    <button type="button" id="warpPantoneSearchBtn" class="btn-pantone-search" title="Pantone 色票搜尋" aria-label="開啟經線 Pantone 色票視窗">
                        <svg class="pantone-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </button>
                </div>
            </div>
            <div class="control-row">
                <label>緯線顏色（橫向）<span class="color-label-codes"><span id="weftHex">#E2E2E2</span><span id="weftPantoneCode" class="pantone-label-line"></span></span></label>
                <div class="color-picker-row">
                    <input type="color" id="weftColor" value="#e2e2e2">
                    <button type="button" id="weftPantoneSearchBtn" class="btn-pantone-search" title="Pantone 色票搜尋" aria-label="開啟緯線 Pantone 色票視窗">
                        <svg class="pantone-search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                    </button>
                </div>
            </div>
            <div class="control-row">
                <button type="button" id="swapColorsBtn" class="btn-secondary">經緯顏色互換 <span class="btn-icon" aria-hidden="true">⇄</span></button>
            </div>


            <div class="section-title">結構調整</div>
            <div class="control-row">
                <label>網格間隙（Gap）<span class="value-tag" id="gapVal">10</span></label>
                <input type="range" id="gapSlider" min="1" max="80" value="9">
            </div>
            <div class="control-row">
                <label>經線粗細（Warp）<span class="value-tag" id="warpThickVal">8</span></label>
                <input type="range" id="warpThickSlider" min="1" max="80" value="8">
            </div>
            <div class="control-row">
                <label>緯線粗細（Weft）<span class="value-tag" id="weftThickVal">5</span></label>
                <input type="range" id="weftThickSlider" min="1" max="80" value="5">
            </div>


            <div class="section-title">質感</div>
            <div class="control-row">
                <label>表面雜訊（Noise）<span class="value-tag" id="noiseVal">35%</span></label>
                <input type="range" id="noiseSlider" min="0" max="100" value="35">
            </div>
        </div>


        <div class="canvas-wrap">
            <canvas id="fabricCanvas" width="500" height="500"></canvas>
        </div>
    </div>


    <section class="swatch-panel" aria-labelledby="swatch-panel-heading">
        <div class="swatch-panel-header">
            <h2 id="swatch-panel-heading" class="swatch-panel-heading">色票</h2>
            <div class="swatch-panel-actions">
                <button type="button" id="exportSwatchBtn" class="btn-tertiary">匯出色票</button>
                <label id="importSwatchLabel" class="btn-tertiary" style="cursor:pointer;margin:0;">匯入色票
                    <input type="file" id="importSwatchInput" accept=".json" style="display:none;">
                </label>
                <button type="button" id="saveSwatchBtn" class="btn-save">儲存目前色票</button>
            </div>
        </div>
